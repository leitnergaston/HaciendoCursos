<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>

    <!-- ESTILOS -->
    <link rel="stylesheet" href="/Css/login.css">

    <!-- ESTILOS LOADER -->
    <link rel="stylesheet" href="/Css/loader.css">

    <!-- Iconos -->
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.8/css/line.css">

</head>
<body>
    <!-- LOADER -->
    <div id="loader">
        <img src="Assets/haciendo-cursos-logo-letras-negras-png.png" alt="" class="img-loader">
        <div class="dot-spinner">
            <div class="dot-spinner__dot"></div>
            <div class="dot-spinner__dot"></div>
            <div class="dot-spinner__dot"></div>
            <div class="dot-spinner__dot"></div>
            <div class="dot-spinner__dot"></div>
            <div class="dot-spinner__dot"></div>
            <div class="dot-spinner__dot"></div>
            <div class="dot-spinner__dot"></div>
        </div>
    </div>
    
    <!-- imagen de fondo -->
    <img src="Assets/haciendo-cursos-logo-letras-negras-png.png" alt="logo de fondo" class="logotipo">

    <header class="header container">
        <div>
            <h1 class="title">Ingreso Curso</h1>
        </div>
    </header>

    <main class="container">
        <section class="sectionLogin">
            <section class="login">
                <div class="container-login">
                    <div class="info-login">
                        <img src="/Assets/login/image 27.jpg" alt="">
                        <form action="" id="loginForm" class="login-form">
                            <label for="" class="form-label">Contraseña</label>
                            <div class="container-input">
                                <input type="password" id="password" required>
                                <i class="uil uil-eye icon-password"></i>
                            </div>
                            <a href="#">
                                <button type="submit" class="btn">Ingresar<i class="uil uil-signin icon"></i></button>
                            </a>
                        </form>
                    </div>
                </div>
            </section>
        </section>
    </main>



    <!-- LOGIN JS -->
    <script src="/Js/login.js"></script>

    <!-- LOADER JS -->
    <script src="/Js/loader.js"></script>
</body>
</html>
